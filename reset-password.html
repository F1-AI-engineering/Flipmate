<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nuova password — FlipMate</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#081426" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand-row" href="index.html"><img src="assets/logo.svg" alt="FlipMate logo" /><span>FlipMate</span></a>
    <nav class="topnav">
      <a class="btn ghost" href="login.html">Accedi</a>
      <label class="lang-picker"><span>Lingua</span><select id="rpLang"><option value="it">IT</option><option value="en">EN</option></select></label>
    </nav>
  </header>
  <main class="auth-page">
    <section class="auth-card card auth-spacious">
      <span class="eyebrow">Reset password</span>
      <h1 id="rpTitle">Imposta una nuova password</h1>
      <p class="muted" id="rpText">Apri questa pagina dal link ricevuto via email, poi inserisci la nuova password.</p>
      <form class="form-grid single">
        <label><span id="rpLabel1">Nuova password</span><input id="newPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
        <label><span id="rpLabel2">Conferma password</span><input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required /></label>
      </form>
      <div class="actions-row wrap auth-actions-spaced">
        <button class="btn primary" id="updatePasswordBtn">Salva nuova password</button>
        <a class="btn ghost" href="login.html" id="backLoginLink">Torna all'accesso</a>
      </div>
    </section>
  </main>
  <div id="toast" class="toast hidden"></div>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script>
    const $=id=>document.getElementById(id); const lang=localStorage.getItem('flipmate_lang')||'it'; $('rpLang').value=lang; const dict={it:{title:'Imposta una nuova password',text:'Apri questa pagina dal link ricevuto via email, poi inserisci la nuova password.',l1:'Nuova password',l2:'Conferma password',save:'Salva nuova password',back:"Torna all'accesso",match:'Le password non coincidono.',short:'Usa almeno 8 caratteri.',ok:'Password aggiornata. Ora puoi accedere.',config:'Supabase non configurato.'},en:{title:'Set a new password',text:'Open this page from the email link, then enter your new password.',l1:'New password',l2:'Confirm password',save:'Save new password',back:'Back to log in',match:'Passwords do not match.',short:'Use at least 8 characters.',ok:'Password updated. You can now log in.',config:'Supabase not configured.'}}; function apply(){const t=dict[$('rpLang').value]; $('rpTitle').textContent=t.title; $('rpText').textContent=t.text; $('rpLabel1').textContent=t.l1; $('rpLabel2').textContent=t.l2; $('updatePasswordBtn').textContent=t.save; $('backLoginLink').textContent=t.back; document.querySelector('.lang-picker span').textContent=$('rpLang').value==='it'?'Lingua':'Language'; localStorage.setItem('flipmate_lang',$('rpLang').value);} apply(); $('rpLang').addEventListener('change',apply); function toast(msg){const el=$('toast'); el.textContent=msg; el.classList.remove('hidden'); clearTimeout(window.__t); window.__t=setTimeout(()=>el.classList.add('hidden'), 2600);} const client=(window.FLIPMATE_SUPABASE_URL&&window.FLIPMATE_SUPABASE_ANON_KEY&&window.supabase)?window.supabase.createClient(window.FLIPMATE_SUPABASE_URL, window.FLIPMATE_SUPABASE_ANON_KEY):null; if(!client) toast(dict[$('rpLang').value].config); document.getElementById('updatePasswordBtn').addEventListener('click', async()=>{const t=dict[$('rpLang').value]; const p=$('newPassword').value, c=$('confirmPassword').value; if(p.length<8) return toast(t.short); if(p!==c) return toast(t.match); const {error}=await client.auth.updateUser({password:p}); if(error) return toast(error.message); toast(t.ok); setTimeout(()=>location.href='login.html',1000); });
  </script>
</body>
</html>
